<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact the White Water Rafting Company team for questions, reservations, and feedback.">
    <meta name="author" content="Stephen Udie">
    <title>Contact Us - White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>

    <header>
        <div class="logo">
            <img src="images/down-the-river.png" alt="White Water Rafting Company Logo">
        </div>
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="https://steveudie1.github.io/wdd130/wwr/about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="company-heading">
            <h1>The Glitch Rafting Company</h1>
            <p class="address">123 Main River Street<br>Calabar, Cross River State</p>
            <p class="phone">+2348187883941</p>
            <p class="email">steveudie@gmail.com</p>
        </section>

        <div class="contact-grid">
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d127178.14269632788!2d8.3588299!3d5.0522717!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1780735214631!5m2!1sen!2sng"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form-container">
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="fullname">Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Placeholder"
                          required>
                    </div>

                    <div class="form-group">
                        <label for="usermail">Email</label>
                        <input type="email" id="usermail" name="usermail" placeholder="Placeholder"
                          required>
                    </div>

                    <div class="form-group-radio">
                        <span class="radio-label-heading">Message Purpose</span>
                        <div class="radio-options">
                            <label><input type="radio" name="purpose" value="general" checked>
                                General Inquiry</label>
                            <label><input type="radio" name="purpose" value="reservation">
                                Reservation Question</label>
                            <label><input type="radio" name="purpose" value="suggestion"> Website
                                Suggestion</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="feedback">Message</label>
                        <textarea id="feedback" name="feedback" rows="4"
                          placeholder="Type here"></textarea>
                    </div>

                    <div class="form-group-checkbox">
                        <label>
                            <input type="checkbox" id="newsletter" name="newsletter" checked>
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </div>
        </div>

        <section class="employee-section">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure class="employee-card">
                    <div class="avatar-placeholder">
                        <img src="images/employee1.jpg" alt="Employee Profile 1">
                    </div>
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure class="employee-card">
                    <div class="avatar-placeholder">
                        <img src="images/employee2.jpg" alt="Employee Profile 2">
                    </div>
                    <figcaption>Employee Profile</figcaption>
                </figure>

                <figure class="employee-card">
                    <div class="avatar-placeholder">
                        <img src="images/smiliing.jpg" alt="Employee Profile 3">
                    </div>
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <!<p>-</p>

            <nav class="socialmedia">
                <a href="https://web.facebook.com/steveudie" target="_blank" aria-label="Facebook">
                    <img src="images/facebook-new.png" alt="Facebook icon">
                </a>
                <a href="https://www.linkedin.com/in/stephen-udie-879804367" target="_blank"
                  aria-label="LinkedIn">
                    <img src="images/linkin.png" alt="LinkedIn icon">
                </a>
                <a href="https://www.instagram.com/udiesteve_travel/" target="_blank"
                  aria-label="Instagram">
                    <img src="images/insta3.jpg" alt="Instagram icon">
                </a>
            </nav>
    </footer>

</body>

</html>
