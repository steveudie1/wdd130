<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main class="box">
        <h1> ✔ Basic HTML and CSS Quiz</h1>
        <form class="box">
            <div class="quiz-item box">
                <label for="q1">What Does the acronym css stand for</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label for="q2">how are id and class attribute selected</label>
                <textarea type="text" id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item box">
                <label for="q3">which of the following is a CSS comment</label>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Choose One...</option>
                    <option value="a">A . &lt;-- This is a comment --&gt;</option>
                    <option value="b">B. /* This is a comment */</option>
                    <option value="c">C. // This is a comment</option>

                </select>
            </div>
            <div class="quiz-item box">
                <label for="q4"> 4. What is the button margin given this declaration ?</label>
                <code class="box">margin: 10px 5px 15px ;</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz</button>


        </form>
    </main>

</body>

</html>
